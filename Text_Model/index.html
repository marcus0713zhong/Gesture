<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Magic Name Generator - Fixed Loading</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #input_video { 
            position: absolute; bottom: 10px; right: 10px; 
            width: 120px; height: 90px; border: 2px solid #00ffcc; 
            z-index: 100; border-radius: 4px; transform: scaleX(-1);
            background: #222;
        }
        #ui-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 10px; background: rgba(0, 0, 0, 0.7);
            padding: 15px; border-radius: 12px; border: 1px solid #00ffcc;
        }
        input {
            background: rgba(255, 255, 255, 0.1); border: 1px solid #00ffcc;
            color: #fff; padding: 8px; border-radius: 5px; outline: none; width: 180px;
        }
        button {
            background: #00ffcc; border: none; color: #000; padding: 8px 15px;
            border-radius: 5px; cursor: pointer; font-weight: bold; min-width: 100px;
        }
        button:disabled { background: #444; color: #888; cursor: wait; }
        #magic-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 255, 204, 0.15); color: #00ffcc; border: 2px solid #00ffcc;
            padding: 20px 40px; border-radius: 50px; font-size: 22px; font-weight: bold;
            text-align: center; z-index: 200; display: none; backdrop-filter: blur(10px);
            animation: pulse 2s infinite; pointer-events: none;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        #status {
            position: absolute; bottom: 20px; left: 20px; color: #00ffcc;
            font-size: 11px; background: rgba(0,0,0,0.5); padding: 5px 10px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>
    <div id="ui-container">
        <input type="text" id="nameInput" placeholder="English Name..." maxlength="12">
        <button id="genBtn" onclick="onGenerateClick()" disabled>Loading...</button>
    </div>
    <div id="magic-msg">You made it! <br> Now wave your hand and feel the magic!</div>
    <div id="status">Starting 3D Engine...</div>
    <video id="input_video"></video>

    <script>
        let scene, camera, renderer, textGroup, globalFont;
        let targetRotationY = 0, canControl = false, videoActive = false;
        const statusDiv = document.getElementById('status');
        const genBtn = document.getElementById('genBtn');
        const magicMsg = document.getElementById('magic-msg');
        const videoElement = document.getElementById('input_video');

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 25;
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            textGroup = new THREE.Group();
            scene.add(textGroup);
            scene.add(new THREE.AmbientLight(0xffffff, 1));

            // 加载字体：主路径和备用路径
            const loader = new THREE.FontLoader();
            const fontPaths = [
                'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/fonts/helvetiker_bold.typeface.json',
                'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/fonts/helvetiker_bold.typeface.json'
            ];

            function loadFont(index) {
                if (index >= fontPaths.length) {
                    statusDiv.innerText = "Error: Failed to load fonts. Check connection.";
                    return;
                }
                loader.load(fontPaths[index], 
                    (font) => {
                        globalFont = font;
                        genBtn.disabled = false;
                        genBtn.innerText = "Generate";
                        statusDiv.innerText = "3D Engine Ready.";
                    },
                    undefined,
                    () => loadFont(index + 1)
                );
            }
            loadFont(0);
            animate();
        }

        function onGenerateClick() {
            const val = document.getElementById('nameInput').value.trim();
            if(!val) return;
            
            while(textGroup.children.length > 0) textGroup.remove(textGroup.children[0]);
            const geo = new THREE.TextGeometry(val.toUpperCase(), {
                font: globalFont, size: 5, height: 1.5, bevelEnabled: true, bevelThickness: 0.2, bevelSize: 0.1
            });
            geo.center();
            textGroup.add(new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0x00ffcc, wireframe: true })));
            
            magicMsg.style.display = 'block';
            setTimeout(() => { magicMsg.style.display = 'none'; }, 4000);
            
            canControl = true;
            statusDiv.innerText = "Magic activated! Wave your hand.";
        }

        function animate() {
            requestAnimationFrame(animate);
            if (canControl) textGroup.rotation.y += (targetRotationY - textGroup.rotation.y) * 0.1;
            textGroup.children.forEach(m => m.material.color.setHSL((Date.now()*0.0005)%1, 0.8, 0.6));
            renderer.render(scene, camera);
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6 });
        hands.onResults((results) => {
            if (canControl && results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                videoActive = true;
                targetRotationY = (results.multiHandLandmarks[0][8].x - 0.5) * Math.PI * 2.5;
            }
        });

        const cameraObj = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });

        window.addEventListener('mousemove', (e) => {
            if(canControl && !videoActive) targetRotationY = (e.clientX / window.innerWidth - 0.5) * Math.PI * 2.5;
        });

        initThree();
        cameraObj.start().catch(() => statusDiv.innerText = "Using Mouse Control.");

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
