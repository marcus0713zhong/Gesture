<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CyberRain - Immersive Edition</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
        #videoElement { display: none; }
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            color: rgba(0, 255, 255, 0.7); font-family: 'Courier New', Courier, monospace;
            font-size: 18px; letter-spacing: 2px; z-index: 20; background: rgba(0,0,0,0.5);
            transition: opacity 1s; pointer-events: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
</head>
<body>

    <div id="start-overlay">[ CLICK ANYWHERE TO INITIALIZE AUDIO & SYSTEM ]</div>
    <video id="videoElement" autoplay playsinline></video>
    <div id="canvas-container"></div>

    <script>
        // ==========================================
        // 0. WEB AUDIO API - 纯代码合成白噪音雨声
        // ==========================================
        let audioCtx;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = audioCtx.sampleRate * 2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; 
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 800; 

            const gain = audioCtx.createGain();
            gain.gain.value = 0.5; 

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
            
            document.getElementById('start-overlay').style.opacity = '0';
        }

        window.addEventListener('click', initAudio, { once: true });

        // ==========================================
        // 1. THREE.JS 核心场景
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.001);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 3000);
        camera.position.set(0, 0, 200);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        container.appendChild(renderer.domElement);

        const PARTICLE_COUNT = 5000;

        function generateTMUTargets() {
            const targets = new Float32Array(PARTICLE_COUNT * 3);
            for(let i = 0; i < PARTICLE_COUNT; i++) {
                let letter = i % 3;
                let x = 0, y = 0, z = (Math.random() - 0.5) * 20;
                let t = Math.random();
                
                if (letter === 0) { // T
                    if (t < 0.3) { x = (Math.random() - 0.5) * 20; y = 20; }
                    else { x = 0; y = (Math.random() - 0.5) * 40; }
                    x -= 35;
                } else if (letter === 1) { // M
                    if (t < 0.25) { x = -15; y = (Math.random() - 0.5) * 40; }
                    else if (t < 0.5) { x = 15; y = (Math.random() - 0.5) * 40; }
                    else if (t < 0.75) { x = -15 + Math.random()*15; y = 20 - (x+15)*1.5; }
                    else { x = 0 + Math.random()*15; y = 0 + x*1.5; }
                } else { // U
                    if (t < 0.4) { x = -15; y = (Math.random() - 0.5) * 40; }
                    else if (t < 0.8) { x = 15; y = (Math.random() - 0.5) * 40; }
                    else { x = (Math.random() - 0.5) * 30; y = -20; }
                    x += 35;
                }
                targets[i * 3] = x;
                targets[i * 3 + 1] = y;
                targets[i * 3 + 2] = z;
            }
            return targets;
        }

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const randoms = new Float32Array(PARTICLE_COUNT);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = generateTMUTargets();

        const colorCyan = new THREE.Color(0x00ffff);
        const colorMagenta = new THREE.Color(0xff00ff);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 1600;      
            positions[i * 3 + 1] = (Math.random() - 0.5) * 1000;    
            positions[i * 3 + 2] = (Math.random() - 0.5) * 800 - 100; 
            randoms[i] = Math.random();

            const mixedColor = colorCyan.clone().lerp(colorMagenta, Math.random());
            colors[i * 3] = mixedColor.r;
            colors[i * 3 + 1] = mixedColor.g;
            colors[i * 3 + 2] = mixedColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aTarget', new THREE.BufferAttribute(targetPositions, 3));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0.0 },
                uSpeed: { value: 1.0 }, 
                uMorph: { value: 0.0 }  
            },
            vertexShader: `
                uniform float uTime;
                uniform float uSpeed;
                uniform float uMorph;
                
                attribute vec3 aTarget;
                attribute float aRandom;
                
                varying vec3 vColor;
                varying float vAlpha;
                
                void main() {
                    vColor = color;
                    
                    vec3 rainPos = position;
                    float dropSpeed = aRandom * 80.0 + 100.0; 
                    rainPos.y -= uTime * dropSpeed;
                    rainPos.y = mod(rainPos.y + 500.0, 1000.0) - 500.0;
                    
                    vec3 tmuPos = aTarget;
                    tmuPos.x += sin(uTime * 2.0 + aTarget.y * 0.1) * 2.0; 
                    tmuPos.y += cos(uTime * 2.0 + aTarget.x * 0.1) * 2.0;
                    tmuPos.z += sin(uTime * 3.0 + aTarget.x) * 5.0;

                    vec3 finalPos = mix(rainPos, tmuPos, uMorph);
                    vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
                    
                    float lineBaseLength = 60.0 * aRandom + 40.0; 
                    float safeZ = abs(mvPosition.z) + 0.1;
                    gl_PointSize = lineBaseLength * (400.0 / safeZ); 
                    
                    vAlpha = smoothstep(-800.0, -100.0, mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                varying float vAlpha;
                
                void main() {
                    vec2 coord = gl_PointCoord; 
                    
                    float lineWidth = 0.03; 
                    float horizontalThresh = abs(coord.x - 0.5);
                    if (horizontalThresh > lineWidth) discard;
                    
                    float verticalFromCenter = abs(coord.y - 0.5); 
                    float linearGlow = smoothstep(0.5, 0.2, verticalFromCenter); 
                    float horizontalGlow = smoothstep(lineWidth, 0.0, horizontalThresh);
                    
                    float alpha = horizontalGlow * linearGlow * vAlpha;
                    vec3 finalColor = vColor * 2.5; 
                    
                    gl_FragColor = vec4(finalColor, alpha);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthTest: false,
            transparent: true,
            vertexColors: true
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ==========================================
        // 2. 状态管理与时间轴技能逻辑
        // ==========================================
        // 增加了 reverseEndTime (反转结束时间) 和 reverseCooldown (冷却结束时间)
        const state = { targetSpeed: 1.0, targetMorph: 0.0, realTime: 0.0, reverseEndTime: 0, reverseCooldown: 0 };
        const videoElement = document.getElementById('videoElement');
        let wristHistory = []; 

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1, modelComplexity: 1,
            minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const camera_mp = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera_mp.start();

        function onResults(results) {
            const now = Date.now();
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                analyzeGesture(results.multiHandLandmarks[0], now);
            } else {
                // 如果手离开了屏幕，依然要检查 5秒技能是否还在持续中
                if (now < state.reverseEndTime) {
                    state.targetSpeed = -2.5;
                    state.targetMorph = 0.0;
                } else {
                    state.targetSpeed = 1.0; 
                    state.targetMorph = 0.0;
                }
            }
        }

        function analyzeGesture(landmarks, now) {
            const wrist = landmarks[0];
            const tips = [landmarks[8], landmarks[12], landmarks[16], landmarks[20]]; 
            const bases = [landmarks[5], landmarks[9], landmarks[13], landmarks[17]]; 
            
            let openFingers = 0;
            for(let i=0; i<4; i++) {
                const tipDist = Math.hypot(tips[i].x - wrist.x, tips[i].y - wrist.y);
                const baseDist = Math.hypot(bases[i].x - wrist.x, bases[i].y - wrist.y);
                if (tipDist > baseDist * 1.2) openFingers++;
            }

            const isFist = openFingers <= 1;
            const isOpen = openFingers >= 4;

            wristHistory.push(JSON.parse(JSON.stringify(wrist)));
            if(wristHistory.length > 15) wristHistory.shift();
            
            let isLiftingUp = false;
            if (wristHistory.length === 15) {
                const oldW = wristHistory[0];
                const dy = wrist.y - oldW.y; 
                // 手掌张开且检测到向上托举动作
                if (dy < -0.12 && openFingers >= 3) {
                    isLiftingUp = true;
                }
            }

            // [核心修改]：触发 5 秒反转技能
            if (isLiftingUp && now > state.reverseCooldown) {
                state.reverseEndTime = now + 5000;      // 锁定 5 秒反转
                state.reverseCooldown = now + 7000;     // 锁定 7 秒冷却 (5秒执行 + 2秒CD)，防止连续触发
            }

            // 规则优先级判定：5秒强制反转 > 握拳 > 悬停 > 正常掉落
            if (now < state.reverseEndTime) {
                state.targetSpeed = -2.5; 
                state.targetMorph = 0.0; 
            } else if (isFist) {
                state.targetMorph = 1.0; 
                state.targetSpeed = 1.0; 
            } else if (isOpen) {
                state.targetSpeed = 0.0; 
                state.targetMorph = 0.0; 
            } else {
                state.targetSpeed = 1.0; 
                state.targetMorph = 0.0; 
            }
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (delta > 0.1) return; 

            material.uniforms.uSpeed.value += (state.targetSpeed - material.uniforms.uSpeed.value) * 0.05;
            material.uniforms.uMorph.value += (state.targetMorph - material.uniforms.uMorph.value) * 0.08;

            state.realTime += delta * material.uniforms.uSpeed.value;
            material.uniforms.uTime.value = state.realTime;

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
