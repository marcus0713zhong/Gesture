<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEON MAZE | Perfect Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --neon-green: #00ff88;
            --neon-red: #ff3e3e;
            --neon-blue: #00d4ff;
            --bg-dark: #05060a;
        }

        body {
            margin: 0; 
            background: var(--bg-dark); 
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            overflow: hidden;
        }

        h1 {
            margin: 0 0 15px 0; 
            font-size: 2rem; 
            letter-spacing: 8px;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        #game-container {
            position: relative; 
            width: 800px; 
            height: 600px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            background: #000;
        }

        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            border-radius: 8px; 
        }
        
        #ui-box {
            position: absolute; 
            top: 25px; 
            right: 40px; 
            z-index: 100;
            text-align: right; 
            pointer-events: none;
        }

        .label { 
            font-size: 12px; 
            color: #666; 
            letter-spacing: 2px; 
            margin-bottom: 5px; 
        }
        
        #timer { 
            font-size: 40px; 
            color: var(--neon-blue); 
            font-weight: 800; 
            font-family: monospace; 
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        #alert-overlay {
            position: absolute; 
            width: 100%; 
            height: 100%;
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(4px);
            z-index: 150; 
            border-radius: 8px;
        }

        .msg-box { 
            background: #0a0b10; 
            border: 1px solid var(--neon-red); 
            padding: 30px 60px; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 62, 62, 0.2);
            border-radius: 8px;
        }

        video { display: none; }
    </style>
</head>
<body>

    <h1>Neon Maze</h1>
    <div id="game-container">
        <canvas id="bgCanvas" width="800" height="600"></canvas>
        <canvas id="fgCanvas" width="800" height="600"></canvas>
        
        <div id="ui-box">
            <div class="label">TIME LEFT</div>
            <div id="timer">30.0</div>
        </div>

        <div id="alert-overlay">
            <div class="msg-box" id="msg-content">
                <h2 style="color:var(--neon-red); margin:0; letter-spacing:2px;" id="alert-title">COLLISION!</h2>
                <p style="color:#888; font-size:14px; margin-top:10px;" id="alert-sub">MOVE CROSSHAIR TO BASE</p>
            </div>
        </div>
    </div>

    <video id="input_video"></video>

<script>
const videoElement = document.getElementById('input_video');
const bgCanvas = document.getElementById('bgCanvas');
const fgCanvas = document.getElementById('fgCanvas');
const bgCtx = bgCanvas.getContext('2d', { willReadFrequently: true });
const fgCtx = fgCanvas.getContext('2d');
const timerDisplay = document.getElementById('timer');
const alertOverlay = document.getElementById('alert-overlay');
const alertTitle = document.getElementById('alert-title');
const alertSub = document.getElementById('alert-sub');

// --- 核心尺寸设定 ---
const PIPE_WIDTH = 60; 
const BALL_RADIUS = 15; 
const SAFE_PATH_WIDTH = 30; 
const START_POS = { x: 70, y: 300 }; // 起点坐标
const FINISH_POS = { x: 740, y: 350 }; // 终点坐标

let isLocked = true; 
let gameActive = false;
let startTime = null;
let timeLeft = 30.0;

// --- 1. 绘制纯净高精度迷宫 (bgCanvas) ---
function drawMaze() {
    bgCtx.fillStyle = '#05060a';
    bgCtx.fillRect(0, 0, 800, 600);

    // 绘制科技网格
    bgCtx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
    bgCtx.lineWidth = 1;
    for(let i=0; i<800; i+=40) { bgCtx.beginPath(); bgCtx.moveTo(i,0); bgCtx.lineTo(i,600); bgCtx.stroke(); }
    for(let i=0; i<600; i+=40) { bgCtx.beginPath(); bgCtx.moveTo(0,i); bgCtx.lineTo(800,i); bgCtx.stroke(); }

    // ================= 物理墙面层 (黑色) =================
    bgCtx.shadowBlur = 15;
    bgCtx.shadowColor = 'rgba(0, 212, 255, 0.15)';
    bgCtx.fillStyle = '#11141d'; 
    bgCtx.strokeStyle = '#11141d';
    
    // 起点基地外墙
    bgCtx.beginPath(); bgCtx.arc(START_POS.x, START_POS.y, 45, 0, Math.PI*2); bgCtx.fill();
    // 终点基地外墙 (防止最后关头出界)
    bgCtx.beginPath(); bgCtx.arc(FINISH_POS.x, FINISH_POS.y, 45, 0, Math.PI*2); bgCtx.fill();

    // 迷宫外墙管道
    bgCtx.lineWidth = PIPE_WIDTH; 
    bgCtx.lineCap = 'round';
    bgCtx.lineJoin = 'round';
    const definePath = () => {
        bgCtx.moveTo(START_POS.x, START_POS.y);
        bgCtx.lineTo(250, 300); bgCtx.lineTo(250, 120);
        bgCtx.lineTo(550, 120); bgCtx.lineTo(550, 480);
        bgCtx.lineTo(350, 480); bgCtx.lineTo(350, 350);
        bgCtx.lineTo(FINISH_POS.x, FINISH_POS.y);
    };
    bgCtx.beginPath(); definePath(); bgCtx.stroke();

    // ================= 安全路径层 (检测层 rgb 30, 40, 50) =================
    bgCtx.shadowBlur = 0;
    bgCtx.fillStyle = 'rgb(30, 40, 50)'; 
    bgCtx.strokeStyle = 'rgb(30, 40, 50)';

    // 起点安全区
    bgCtx.beginPath(); bgCtx.arc(START_POS.x, START_POS.y, 30, 0, Math.PI*2); bgCtx.fill();
    // 终点安全区
    bgCtx.beginPath(); bgCtx.arc(FINISH_POS.x, FINISH_POS.y, 30, 0, Math.PI*2); bgCtx.fill();

    // 迷宫内部安全区
    bgCtx.lineWidth = SAFE_PATH_WIDTH; 
    bgCtx.beginPath(); definePath(); bgCtx.stroke();
}

// 初始化背景层
drawMaze();

// --- 2. 绘制前端 UI (起点和终点的发光效果, fgCanvas) ---
function drawUI() {
    // ---- 绘制起点 ----
    fgCtx.shadowColor = '#00ff88';
    fgCtx.shadowBlur = 10;
    fgCtx.strokeStyle = isLocked ? 'rgba(0, 255, 136, 0.8)' : 'rgba(0, 255, 136, 0.2)';
    fgCtx.lineWidth = 2;
    fgCtx.beginPath(); fgCtx.arc(START_POS.x, START_POS.y, 40, 0, Math.PI*2); fgCtx.stroke();
    
    fgCtx.shadowBlur = 0;
    fgCtx.fillStyle = isLocked ? 'rgba(0, 255, 136, 0.9)' : 'rgba(0, 255, 136, 0.3)';
    fgCtx.font = 'bold 12px sans-serif';
    fgCtx.textAlign = 'center';
    fgCtx.fillText("BASE", START_POS.x, START_POS.y - 50);

    // ---- 绘制终点 (霓虹红) ----
    fgCtx.shadowBlur = 20;
    fgCtx.shadowColor = '#ff3e3e';
    fgCtx.fillStyle = '#ff3e3e';
    fgCtx.beginPath(); fgCtx.arc(FINISH_POS.x, FINISH_POS.y, 25, 0, Math.PI*2); fgCtx.fill();
    fgCtx.shadowBlur = 0;
    
    fgCtx.fillStyle = 'rgba(255, 62, 62, 0.8)';
    fgCtx.fillText("GOAL", FINISH_POS.x, FINISH_POS.y - 40);
}

// --- 3. 手势数据处理与核心逻辑 ---
function onResults(results) {
    fgCtx.clearRect(0, 0, 800, 600);
    drawUI(); // 渲染 UI 层

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const finger = results.multiHandLandmarks[0][8];
        const rawX = (1 - finger.x) * 800;
        const rawY = finger.y * 600;

        // 绘制“幽灵准星”
        fgCtx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
        fgCtx.lineWidth = 2;
        fgCtx.beginPath(); fgCtx.arc(rawX, rawY, 18, 0, Math.PI*2); fgCtx.stroke();
        fgCtx.beginPath(); fgCtx.moveTo(rawX - 6, rawY); fgCtx.lineTo(rawX + 6, rawY); fgCtx.stroke();
        fgCtx.beginPath(); fgCtx.moveTo(rawX, rawY - 6); fgCtx.lineTo(rawX, rawY + 6); fgCtx.stroke();

        // 获取底层检测像素
        const pixel = bgCtx.getImageData(rawX, rawY, 1, 1).data;
        const isOnPath = Math.abs(pixel[0] - 30) <= 5 && Math.abs(pixel[1] - 40) <= 5; 
        
        // 计算到起点和终点的精确直线距离
        const distToStart = Math.hypot(rawX - START_POS.x, rawY - START_POS.y);
        const distToGoal = Math.hypot(rawX - FINISH_POS.x, rawY - FINISH_POS.y);

        let displayX = rawX;
        let displayY = rawY;
        let ballColor = '#00ff88';

        if (isLocked) {
            // 锁定在基地
            displayX = START_POS.x;
            displayY = START_POS.y;
            ballColor = '#444'; 
            
            if (distToStart < 60) {
                isLocked = false;
                alertOverlay.style.display = 'none';
                if (!gameActive) startGame();
            } else {
                // 虚线引导
                fgCtx.strokeStyle = 'rgba(0, 255, 136, 0.5)';
                fgCtx.setLineDash([5, 5]);
                fgCtx.beginPath(); fgCtx.moveTo(rawX, rawY); fgCtx.lineTo(START_POS.x, START_POS.y); fgCtx.stroke();
                fgCtx.setLineDash([]); 
            }
        } else {
            // ================= 正常游戏核心逻辑 =================
            // 优先判定是否通关 (只要距离终点圆心小于 25px 即通关)
            if (distToGoal <= 25) {
                triggerWin();
            } 
            // 其次判定是否撞墙
            else if (!isOnPath) {
                triggerCrash();
            }

            if (gameActive) {
                const elapsed = (Date.now() - startTime) / 1000;
                timeLeft = Math.max(0, 30 - elapsed).toFixed(1);
                timerDisplay.innerText = timeLeft;
                
                if (timeLeft <= 0) triggerTimeout();
            }
        }

        drawBall(displayX, displayY, ballColor);
    }
}

// --- 4. 渲染球与状态控制 ---
function drawBall(x, y, color) {
    fgCtx.shadowBlur = 15;
    fgCtx.shadowColor = color;
    fgCtx.fillStyle = color;
    fgCtx.beginPath(); fgCtx.arc(x, y, BALL_RADIUS, 0, Math.PI*2); fgCtx.fill();
    fgCtx.fillStyle = "white";
    fgCtx.beginPath(); fgCtx.arc(x, y, 4, 0, Math.PI*2); fgCtx.fill();
    fgCtx.shadowBlur = 0;
}

function startGame() {
    gameActive = true;
    startTime = Date.now();
    timeLeft = 30.0;
}

function triggerCrash() {
    isLocked = true;
    gameActive = false;
    showAlert("COLLISION!", "MOVE CROSSHAIR TO BASE", "var(--neon-red)");
}

function triggerTimeout() {
    isLocked = true;
    gameActive = false;
    showAlert("TIME OVER!", "MOVE CROSSHAIR TO BASE", "var(--neon-red)");
    timerDisplay.innerText = "0.0";
}

function triggerWin() {
    isLocked = true;
    gameActive = false;
    showAlert("MISSION SUCCESS", "RETURN CROSSHAIR TO BASE", "var(--neon-green)");
}

function showAlert(title, sub, color) {
    alertOverlay.style.display = 'flex';
    document.querySelector('.msg-box').style.borderColor = color;
    alertTitle.innerText = title;
    alertTitle.style.color = color;
    alertSub.innerText = sub;
}

// --- 5. 启动 AI ---
const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
hands.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 800, height: 600
});
camera.start();
</script>
</body>
</html>
